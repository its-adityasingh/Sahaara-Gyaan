<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sahaara Gyaan </title>
    <meta name="description" content="Sahaara–Gyaan: An inclusive digital learning platform bridging the education gap in India. Quality education for every child, regardless of location, language, or ability." />
    <meta name="author" content="Sahaara–Gyaan" />
    <meta name="theme-color" content="#F7941D" />

    <meta property="og:title" content="Sahaara–Gyaan | Inclusive Learning for Every Child" />
    <meta property="og:description" content="Quality education for every child in India, regardless of location, language, or ability." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/placeholder.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@SahaaraGyaan" />
    <meta name="twitter:image" content="/placeholder.svg" />
    
    <style>
      /* Fallback styles in case CSS doesn't load */
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f8fafc;
      }
      #root {
        min-height: 100vh;
      }
      .loading-fallback {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        flex-direction: column;
        gap: 16px;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e2e8f0;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <!-- Fallback loading state -->
      <noscript>
        <div class="loading-fallback">
          <h1>Sahaara Gyaan</h1>
          <p>JavaScript is required to run this application. Please enable JavaScript in your browser settings.</p>
        </div>
      </noscript>
      <div class="loading-fallback" id="loading-fallback" style="display: none;">
        <div class="loading-spinner"></div>
        <p>Loading Sahaara Gyaan...</p>
      </div>
    </div>
    <script>
      // Show loading fallback immediately
      window.addEventListener('DOMContentLoaded', function() {
        const root = document.getElementById('root');
        const fallback = document.getElementById('loading-fallback');
        if (root && fallback && root.children.length === 1) {
          fallback.style.display = 'flex';
        }
      });
      
      // Hide fallback when React mounts
      window.addEventListener('load', function() {
        setTimeout(function() {
          const fallback = document.getElementById('loading-fallback');
          if (fallback) {
            fallback.style.display = 'none';
          }
        }, 100);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
